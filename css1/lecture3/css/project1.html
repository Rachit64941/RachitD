<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cards</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .card{
            width:400px;
            height: 600px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 21px;
            border-radius:10px;

            
        }
    .container{
        width: 100vw;
        height:100vh;
        background-color: rgb(75, 72, 132);
        background-image:-o-linear-gradient();
        display: flex;
        justify-content: center;
        align-items: center;
    } 
    .card img{
        height: 50%;


    }
    .card h2{
        font-size: 1.4em;
        font-weight: bolder;
        

    }
    .card p{
        font-size: 1.3em;
        font-weight: lighter;
        font-style: oblique;



    }

    
        

    


    </style>
    
</head>
<body>
    <div class="container"> 
        <div class="card">
            <img src="mn.avif"/>
            <h2> improve your frontend skill by developing project</h2>
            <p> Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium eaque, officiis blanditiis aperiam, maiores quasi qui placeat consequuntur <a href="" class=""></a></p>
            
        </div>
        
    
        

    


    </div>
    
</body>
</html>
